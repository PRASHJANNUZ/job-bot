name: Daily Job Bot

on:
  schedule:
    - cron: '30 0 * * *'  # 6 AM IST

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - run: pip install -r requirements.txt

      - run: python job_bot.py
